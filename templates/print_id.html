<!DOCTYPE html>
<html>
  <head>
    <title>ID Preview</title>

    <style>
      body {
        text-align: center;
        font-family: Arial;
        background: #f5f5f5;
      }
      
      .card {
        display: inline-block;
        margin: 20px;
      }
      
      img {
        width: 300px;
        height: auto;
      
        border: 2px solid black;
      }
      
      button {
        padding: 12px 25px;
        background: orange;
        border: none;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>ID Card Preview</h1>

    <div class="card">
      <h3>Front</h3>

      <img src="/{{ front }}" />
    </div>

    <div class="card">
      <h3>Back</h3>

      <img src="/{{ back }}" />
    </div>

    <br /><br />

    <button onclick="window.print()">Print ID Card</button>

    <br /><br />

    <a href="/dashboard">Back to Dashboard</a>
  </body>
</html>
